<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth</title>
<style>
body{font-family:Arial;background:#0c1b2a;color:white;text-align:center;}
form{display:none;margin:20px auto;width:300px;}
form.active{display:block;}
input,button{width:100%;padding:10px;margin:5px;}
</style>
</head>

<body>

<h2>Auth System</h2>

<button onclick="showLogin()">Login</button>
<button onclick="showSignup()">Signup</button>

<form id="signupForm" class="active">
<input name="fullname" placeholder="Fullname" required>
<input name="email" placeholder="Email" required>
<input name="phone" placeholder="Phone" required>
<input name="password" type="password" placeholder="Password" required>
<input name="confirmPassword" type="password" placeholder="Confirm Password" required>
<button>Signup</button>
</form>

<form id="otpForm">
<input name="otp" placeholder="Enter OTP">
<button>Verify</button>
</form>

<form id="loginForm">
<input name="email" placeholder="Email">
<input name="password" type="password" placeholder="Password">
<button>Login</button>
</form>

<script>
const API="https://isaac-kitchen.onrender.com/api/auth";

const signupForm=document.getElementById("signupForm");
const otpForm=document.getElementById("otpForm");
const loginForm=document.getElementById("loginForm");

function showSignup(){
signupForm.classList.add("active");
loginForm.classList.remove("active");
otpForm.classList.remove("active");
}

function showLogin(){
loginForm.classList.add("active");
signupForm.classList.remove("active");
otpForm.classList.remove("active");
}

function showOTP(){
otpForm.classList.add("active");
signupForm.classList.remove("active");
}

// SIGNUP
signupForm.addEventListener("submit",async e=>{
e.preventDefault();

try{
alert("Server waking up...");

const dataForm=new FormData(signupForm);

if(dataForm.get("password")!==dataForm.get("confirmPassword")){
alert("Passwords mismatch");
return;
}

const res=await fetch(API+"/signup",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fullname:dataForm.get("fullname"),
email:dataForm.get("email"),
phone:dataForm.get("phone"),
password:dataForm.get("password")
})
});

const data=await res.json();

if(res.ok){
localStorage.setItem("userId",data.userId);
alert("OTP: "+data.otp);
showOTP();
}else{
alert(data.error);
}

}catch(err){
alert("Error: server down or sleeping");
}
});

// VERIFY OTP
otpForm.addEventListener("submit",async e=>{
e.preventDefault();

const otp=otpForm.otp.value;
const userId=localStorage.getItem("userId");

const res=await fetch(API+"/verify-otp",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({userId,otp})
});

const data=await res.json();

if(res.ok){
alert("Verified!");
showLogin();
}else{
alert(data.error);
}
});

// LOGIN
loginForm.addEventListener("submit",async e=>{
e.preventDefault();

const email=loginForm.email.value;
const password=loginForm.password.value;

const res=await fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

const data=await res.json();

if(res.ok){
localStorage.setItem("token",data.token);
alert("Login success");
}else{
alert(data.error);
}
});
</script>

</body>
</html>
